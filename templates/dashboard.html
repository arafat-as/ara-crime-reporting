{% extends 'base.html' %}

{% block title %}My Dashboard{% endblock %}

{% block content %}
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2><i class="fa-solid fa-gauge"></i> My Dashboard</h2>
        <a href="/report/new" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Report</a>
    </div>
    
    <div class="dashboard-grid">
        <div class="glass-panel stat-card">
            <div class="stat-icon"><i class="fa-solid fa-file-shield"></i></div>
            <div class="stat-content">
                <h3 id="stat-total">0</h3>
                <p>Total Reports</p>
            </div>
        </div>
        <div class="glass-panel stat-card">
            <div class="stat-icon" style="color: var(--status-investigating); background: rgba(59, 130, 246, 0.1);"><i class="fa-solid fa-magnifying-glass"></i></div>
            <div class="stat-content">
                <h3 id="stat-investigating">0</h3>
                <p>Under Investigation</p>
            </div>
        </div>
        <div class="glass-panel stat-card">
            <div class="stat-icon" style="color: var(--status-resolved); background: rgba(16, 185, 129, 0.1);"><i class="fa-solid fa-check-double"></i></div>
            <div class="stat-content">
                <h3 id="stat-resolved">0</h3>
                <p>Resolved</p>
            </div>
        </div>
    </div>
    
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
        <!-- My Reports -->
        <div class="glass-panel" style="padding: 25px;">
            <h3 style="margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">My Recent Reports</h3>
            
            <div id="reports-list">
                <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                    <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                    <p style="margin-top: 10px;">Loading reports...</p>
                </div>
            </div>
        </div>
        
        <!-- Notifications -->
        <div class="glass-panel" style="padding: 25px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">
                <h3 style="margin: 0;">Notifications</h3>
                <button id="btn-read-all" class="btn btn-outline" style="padding: 4px 8px; font-size: 0.75rem;">Mark All Read</button>
            </div>
            
            <div id="notifications-list" style="max-height: 500px; overflow-y: auto;">
                <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                    <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (!Auth.requireAuth()) return;
        
        window.refreshMyReports = fetchMyReports;
        fetchMyReports();
        fetchNotifications();
        
        document.getElementById('btn-read-all').addEventListener('click', async () => {
            try {
                await App.api('/notifications/read-all', { method: 'PUT' });
                fetchNotifications();
            } catch (e) {
                console.error(e);
            }
        });
    });
    
    async function fetchMyReports() {
        try {
            const data = await App.api('/reports/my');
            
            // Update stats
            document.getElementById('stat-total').innerText = data.total || 0;
            const investigating = data.reports.filter(r => r.status === 'investigating').length;
            const resolved = data.reports.filter(r => r.status === 'resolved').length;
            document.getElementById('stat-investigating').innerText = investigating;
            document.getElementById('stat-resolved').innerText = resolved;
            
            // Render list
            const container = document.getElementById('reports-list');
            
            if (data.reports.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                        <i class="fa-solid fa-folder-open fa-3x" style="margin-bottom: 15px; opacity: 0.5;"></i>
                        <p>You haven't submitted any reports yet.</p>
                        <a href="/report/new" class="btn btn-outline" style="margin-top: 15px;">Submit a Report</a>
                    </div>
                `;
                return;
            }
            
            let html = '';
            data.reports.forEach(report => {
                html += `
                    <div class="report-card glass-panel" style="margin-bottom: 15px; padding: 15px;" onclick="window.location.href='/report/${report.id}'">
                        <div class="report-meta">
                            <span><i class="fa-regular fa-clock"></i> ${App.formatDate(report.created_at)}</span>
                            <div>
                                ${App.getSeverityBadge(report.severity)}
                                ${App.getStatusBadge(report.status)}
                            </div>
                        </div>
                        <h4 class="report-title">${report.title}</h4>
                        <p class="report-desc">${report.description}</p>
                        <div style="display: flex; gap: 15px; font-size: 0.85rem; color: var(--text-muted);">
                            <span><i class="fa-solid fa-tag"></i> ${report.category?.name || 'Unknown'}</span>
                            ${report.address ? `<span><i class="fa-solid fa-location-dot"></i> ${report.address}</span>` : ''}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        } catch (error) {
            document.getElementById('reports-list').innerHTML = `
                <div style="text-align: center; color: var(--color-critical); padding: 20px;">
                    Failed to load reports: ${error.message}
                </div>
            `;
        }
    }
    
    async function fetchNotifications() {
        try {
            const data = await App.api('/notifications');
            const container = document.getElementById('notifications-list');
            
            if (data.notifications.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                        <i class="fa-regular fa-bell-slash fa-2x" style="margin-bottom: 15px; opacity: 0.5;"></i>
                        <p>No notifications.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            data.notifications.forEach(n => {
                const bg = n.is_read ? 'transparent' : 'rgba(0, 212, 255, 0.05)';
                const border = n.is_read ? 'none' : '1px solid rgba(0, 212, 255, 0.2)';
                
                html += `
                    <div style="padding: 15px; margin-bottom: 10px; border-radius: 8px; background: ${bg}; border: ${border}; transition: 0.2s; cursor: pointer;"
                         onclick="markRead(${n.id})">
                        <p style="margin: 0; font-size: 0.95rem; color: ${n.is_read ? 'var(--text-muted)' : '#fff'};">${n.message}</p>
                        <small style="color: var(--text-muted); font-size: 0.75rem;">${App.formatDate(n.created_at)}</small>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        } catch (error) {
            console.error(error);
        }
    }
    
    async function markRead(id) {
        try {
            await App.api(`/notifications/${id}/read`, { method: 'PUT' });
            fetchNotifications();
        } catch (e) {
            console.error(e);
        }
    }
</script>
{% endblock %}

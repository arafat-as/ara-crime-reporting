{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container auth-container">
    <div class="glass-panel auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-user-shield"></i>
            <h2>Welcome Back</h2>
            <p style="color: var(--text-muted);">Sign in to access your dashboard</p>
        </div>
        
        <div id="login-error" class="alert-box" style="display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--color-critical); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem;"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Username or Email</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="position: absolute; left: 15px; top: 15px; color: var(--text-muted);"></i>
                    <input type="text" name="username" class="form-control" style="padding-left: 45px;" required placeholder="Enter username">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 15px; top: 15px; color: var(--text-muted);"></i>
                    <input type="password" name="password" class="form-control" style="padding-left: 45px;" required placeholder="••••••••">
                </div>
            </div>
            
            <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-muted); cursor: pointer;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" style="font-size: 0.9rem;">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1.1rem;">Login</button>
        </form>
        
        <div style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 0.95rem;">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (App.state.token) {
            window.location.href = '/dashboard';
        }
    });
</script>
{% endblock %}
